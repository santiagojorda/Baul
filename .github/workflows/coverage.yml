name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6

      - name: Static analysis (detekt + Android Lint)
        run: ./gradlew detekt lintDebug

      - name: Run unit tests with coverage
        run: ./gradlew testDebugUnitTest koverXmlReportDebug

      # Dependabot no tiene acceso a los secrets normales del repo (GitHub lo restringe a
      # propósito, para que un PR de bump de version no pueda robarse un secret) — sin este if,
      # CODECOV_TOKEN llega vacio en esas PRs, Codecov rechaza el upload, y fail_ci_if_error deja
      # todo el job en rojo aunque tests/detekt/lint hayan pasado bien.
      #
      # OJO: tiene que ser github.event.pull_request.user.login (quien abrió el PR), no
      # github.actor (quien disparó esta corrida puntual) — un rerun manual mío sobre un PR de
      # Dependabot sigue sin secrets aunque el actor sea yo, porque la restricción está atada al
      # PR/branch, no a quién lo relanza. Queda null (no error) en push a main, así que ahí igual
      # se ejecuta.
      #
      # fail_ci_if_error: false a propósito: Codecov tiene un bug de infraestructura propio
      # (migración de keybase de su clave GPG de firma) que hace que la verificación de firma del
      # binario del uploader falle de forma intermitente — no depende de nuestra versión pinneada
      # ni de nada de este repo (confirmado viendo corridas alternar éxito/fallo con el mismo
      # v7). No tiene sentido que un blip de un tercero tire abajo todo el chequeo requerido de CI
      # cuando lo que de verdad importa (tests/detekt/lint) ya corrió bien arriba.
      - uses: codecov/codecov-action@v7
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/build/reports/kover/reportDebug.xml
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && github.event.pull_request.user.login != 'dependabot[bot]' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: app/build/test-results/testDebugUnitTest/*.xml
          fail_ci_if_error: false
